<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>华志明 · 个人主页分享卡</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1b3858;
    --navy-dark: #0d2037;
    --gold: #c5a14f;
    --muted: #68798c;
    --line: #e4e9ef;
  }
  body {
    width: 750px;
    height: 1200px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Microsoft YaHei", sans-serif;
    color: var(--navy-dark);
    background:
      radial-gradient(circle at 12% 8%, rgba(197,161,79,.18), transparent 28%),
      radial-gradient(circle at 88% 88%, rgba(27,56,88,.22), transparent 36%),
      linear-gradient(145deg, #f8fafb, #dfe8f3);
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    width: 620px;
  }
  .card {
    position: relative;
    overflow: hidden;
    padding: 40px;
    border-radius: 32px;
    background: rgba(255,255,255,.97);
    box-shadow: 0 28px 80px rgba(15,36,64,.18);
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 0 0 auto;
    height: 8px;
    background: linear-gradient(90deg, var(--navy-dark), var(--navy), var(--gold));
  }
  .card::after {
    content: "";
    position: absolute;
    top: -150px;
    right: -130px;
    width: 320px;
    height: 320px;
    border: 1px solid rgba(27,56,88,.08);
    border-radius: 50%;
    box-shadow: 0 0 0 44px rgba(27,56,88,.025);
    pointer-events: none;
  }
  .identity {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .avatar {
    width: 108px;
    height: 108px;
    flex: none;
    overflow: hidden;
    border: 4px solid #fff;
    border-radius: 50%;
    box-shadow: 0 8px 26px rgba(28,58,94,.18);
  }
  .avatar img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }
  .eyebrow {
    margin-bottom: 5px;
    color: var(--gold);
    font-size: 15px;
    font-weight: 750;
    letter-spacing: .18em;
  }
  h1 {
    font-size: 44px;
    line-height: 1.15;
    letter-spacing: .08em;
  }
  .role {
    margin-top: 7px;
    color: var(--muted);
    font-size: 19px;
  }
  .motto {
    margin-top: 30px;
    padding: 18px 22px;
    border-left: 4px solid var(--gold);
    border-radius: 0 16px 16px 0;
    color: var(--navy);
    background: #f4f7fa;
    font-family: "STKaiti", "KaiTi", serif;
    font-size: 22px;
    line-height: 1.7;
  }
  .motto strong {
    color: var(--gold);
    font-weight: 700;
  }
  .qr-section {
    display: flex;
    align-items: center;
    gap: 30px;
    margin-top: 34px;
    padding-top: 30px;
    border-top: 1px solid var(--line);
  }
  .qr {
    width: 220px;
    height: 220px;
    flex: none;
    padding: 13px;
    border: 1px solid var(--line);
    border-radius: 22px;
    background: #fff;
    box-shadow: 0 10px 30px rgba(28,58,94,.1);
  }
  .qr img {
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: pixelated;
  }
  .qr-copy strong {
    display: block;
    font-size: 26px;
    line-height: 1.5;
  }
  .qr-copy p {
    margin-top: 10px;
    color: var(--muted);
    font-size: 16px;
    line-height: 1.7;
  }
  .hint {
    margin-top: 22px;
    color: #718096;
    font-size: 16px;
    text-align: center;
    letter-spacing: .04em;
  }
</style>
</head>
<body>
<main class="wrap">
  <article class="card">
    <header class="identity">
      <picture class="avatar">
        <source srcset="images/avatar_cartoon.webp" type="image/webp">
        <img src="images/avatar_cartoon.jpg" alt="华志明头像">
      </picture>
      <div>
        <div class="eyebrow">PERSONAL HOMEPAGE</div>
        <h1>华志明</h1>
      </div>
    </header>

    <blockquote class="motto">“我与我，周旋久，<strong>宁作我。</strong>”<br>往前看，向上走，在路上。</blockquote>

    <section class="qr-section">
      <div class="qr">
        <img src="images/homepage-qr.png" alt="个人主页二维码">
      </div>
      <div class="qr-copy">
        <strong>扫码进入<br>个人主页</strong>
        <p>手机扫码访问</p>
      </div>
    </section>
  </article>
  <p class="hint">长按保存并分享 · 扫描二维码访问完整主页</p>
</main>
</body>
</html>
