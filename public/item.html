<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>加载中...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,'Microsoft YaHei',sans-serif}
body{background:#f5f5f5;padding:20px;max-width:700px;margin:0 auto}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.back{display:inline-block;margin-bottom:16px;color:#1C3A5E;text-decoration:none;font-size:14px}
h1{font-size:20px;color:#1a1a1a;margin-bottom:10px}
.time{font-size:12px;color:#999;margin-bottom:16px}
.content{font-size:15px;line-height:1.8;color:#333;white-space:pre-wrap;margin-bottom:16px}
.files{margin-top:10px}
.files img{max-width:100%;border-radius:8px;margin:8px 0;display:block}
.files a{display:inline-block;background:#f0f4f8;padding:8px 14px;border-radius:6px;color:#1C3A5E;text-decoration:none;font-size:13px;margin:4px}
.notfound{text-align:center;color:#bbb;margin-top:80px;font-size:15px}
</style>
</head>
<body>
<a class="back" href="/" id="backLink">← 返回</a>
<div id="content"></div>
<script>
async function load(){
  const id=location.pathname.split('/item/')[1];
  if(!id){show('NotFound');return}
  const res=await fetch('/api/item/'+id);
  if(!res.ok){show('NotFound');return}
  const i=await res.json();
  document.title=i.title+' - 我的分享';
  document.getElementById('backLink').style.display='inline-block';

  let html=`<div class="card"><h1>${i.title||'无标题'}</h1>
    <div class="time">${new Date(i.createdAt).toLocaleDateString('zh-CN')}</div>
    <div class="content">${i.content||''}</div>`;
  if(i.files&&i.files.length){
    html+='<div class="files">';
    i.files.forEach(f=>{
      if(/\.(jpg|jpeg|png|gif|webp)$/i.test(f.url)){
        html+=`<img src="${f.url}" alt="${f.name||''}" />`;
      }else{
        html+=`<a href="${f.url}" target="_blank" download="${f.name||''}">📎 ${f.name||'下载文件'}</a>`;
      }
    });
    html+='</div>';
  }
  html+='</div>';
  document.getElementById('content').innerHTML=html;
}
function show(t){document.getElementById('content').innerHTML='<div class="notfound">内容未找到</div>'}
load();
</script>
</body>
</html>
