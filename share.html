<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f2440">
<meta name="description" content="华志明的个人名片与个人主页入口">
<meta property="og:type" content="profile">
<meta property="og:title" content="华志明 · 个人名片">
<meta property="og:description" content="法学在读研究生 · 往前看，向上走，在路上">
<meta property="og:url" content="https://25sa.github.io/grzy/share.html">
<meta property="og:image" content="https://25sa.github.io/grzy/avatar_cartoon.jpg">
<link rel="canonical" href="https://25sa.github.io/grzy/share.html">
<title>华志明 · 个人名片</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --navy: #1c3a5e;
    --navy-dark: #0f2440;
    --gold: #c9a84c;
    --paper: #ffffff;
    --muted: #6b7b8d;
    --line: #e8ecf0;
  }

  html {
    min-height: 100%;
    background: #e9eef5;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    padding:
      max(20px, env(safe-area-inset-top))
      max(18px, env(safe-area-inset-right))
      max(24px, env(safe-area-inset-bottom))
      max(18px, env(safe-area-inset-left));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Microsoft YaHei", sans-serif;
    color: var(--navy-dark);
    background:
      radial-gradient(circle at 10% 10%, rgba(201, 168, 76, 0.15), transparent 30%),
      radial-gradient(circle at 90% 86%, rgba(28, 58, 94, 0.15), transparent 34%),
      linear-gradient(145deg, #f8fafc, #e7edf5);
    -webkit-font-smoothing: antialiased;
  }

  .page {
    width: 100%;
    max-width: 420px;
    min-width: 0;
    flex: 0 1 420px;
  }

  .card {
    position: relative;
    overflow: hidden;
    padding: 30px 26px 24px;
    border: 1px solid rgba(255, 255, 255, 0.82);
    border-radius: 28px;
    background: rgba(255, 255, 255, 0.96);
    box-shadow: 0 22px 70px rgba(15, 36, 64, 0.16);
    min-width: 0;
  }

  .card::before {
    content: "";
    position: absolute;
    inset: 0 0 auto;
    height: 7px;
    background: linear-gradient(90deg, var(--navy-dark), var(--navy), var(--gold));
  }

  .card::after {
    content: "HZM";
    position: absolute;
    right: -12px;
    top: 82px;
    color: rgba(28, 58, 94, 0.035);
    font-size: 82px;
    font-weight: 800;
    letter-spacing: -6px;
    pointer-events: none;
  }

  .identity {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 17px;
  }

  .avatar {
    width: 82px;
    height: 82px;
    flex: 0 0 auto;
    overflow: hidden;
    border: 3px solid #fff;
    border-radius: 50%;
    background: #eef2f7;
    box-shadow: 0 6px 22px rgba(28, 58, 94, 0.16);
  }

  .avatar img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }

  .eyebrow {
    margin-bottom: 3px;
    color: var(--gold);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  h1 {
    font-size: 31px;
    line-height: 1.18;
    letter-spacing: 0.08em;
  }

  .role {
    margin-top: 5px;
    color: var(--muted);
    font-size: 14px;
  }

  .motto {
    position: relative;
    z-index: 1;
    margin-top: 23px;
    padding: 13px 15px;
    border-left: 3px solid var(--gold);
    border-radius: 0 12px 12px 0;
    color: var(--navy);
    background: #f5f7fa;
    font-family: "STKaiti", "KaiTi", serif;
    font-size: 15px;
    line-height: 1.7;
  }

  .details {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-top: 20px;
  }

  .detail {
    min-width: 0;
    padding: 11px 12px;
    border: 1px solid var(--line);
    border-radius: 13px;
    background: #fff;
  }

  .detail-label {
    display: block;
    margin-bottom: 3px;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.12em;
  }

  .detail-value {
    display: block;
    overflow: hidden;
    color: var(--navy-dark);
    font-size: 12px;
    font-weight: 600;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .visit {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 50px;
    margin-top: 22px;
    border-radius: 15px;
    color: #fff;
    background: linear-gradient(135deg, var(--navy-dark), var(--navy));
    box-shadow: 0 9px 22px rgba(28, 58, 94, 0.2);
    font-size: 15px;
    font-weight: 650;
    letter-spacing: 0.08em;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }

  .visit:active {
    transform: scale(0.985);
  }

  .hint {
    margin-top: 14px;
    color: #718096;
    font-size: 12px;
    line-height: 1.6;
    text-align: center;
  }

  @media (max-width: 370px) {
    .card {
      padding-inline: 20px;
    }

    .details {
      grid-template-columns: 1fr;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      transition: none !important;
    }
  }

  @media print {
    body {
      padding: 0;
      background: #fff;
    }

    .card {
      box-shadow: none;
    }

    .hint {
      display: none;
    }
  }
</style>
</head>
<body>
<main class="page">
  <article class="card" aria-label="华志明个人名片">
    <header class="identity">
      <picture class="avatar">
        <source srcset="./avatar_cartoon.webp" type="image/webp">
        <img src="./avatar_cartoon.jpg" alt="华志明头像" width="82" height="82">
      </picture>
      <div>
        <div class="eyebrow">Personal Card</div>
        <h1>华志明</h1>
        <p class="role">法学 · 在读研究生</p>
      </div>
    </header>

    <blockquote class="motto">“往前看，向上走，在路上。”</blockquote>

    <section class="details" aria-label="联系信息">
      <div class="detail">
        <span class="detail-label">EMAIL</span>
        <span class="detail-value">2290617364@qq.com</span>
      </div>
    </section>

    <a class="visit" href="./">
      查看完整个人主页
    </a>
  </article>

  <p class="hint">可直接转发此页面作为个人电子名片</p>
</main>
</body>
</html>
